name: Check Build

on:
    push:

jobs:
    check-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Golang dependency
              uses: actions/setup-go@v3
              with:
                    go-version: '1.24'

            - name: Build
              run: go build ./...