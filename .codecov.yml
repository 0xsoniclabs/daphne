# default coverage setting
coverage:
  range: 90..99 # below 50 is red, between 50-80 is yellow and above 80 is green
  round: down
  precision: 2
  status:
    patch:
      default:
        target: 100% # coverage of the changes
        threshold: 2% # allow the coverage to drop by <threshold>%
    project:
      default:
        target: 100% # coverage of the project
ignore:
  - "tests/"
  - "**/*_mock.go"
  - "**/*_test.go"
  - "**/*.pb.go"
  - "**/*_string.go"
